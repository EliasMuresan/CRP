          - name: image
            label: Imagine
            type: image
          - name: imageAlt
            label: Text alternativ imagine
            type: string
      - name: team
        label: Comitet
        type: object
        fields:
          - name: kicker
            label: Eticheta
            type: string
          - name: title
            label: Titlu
            type: string
          - name: intro
            label: Descriere
            type: text
          - name: main
            label: Lideri principali
            component: person
            list:
              collapsible:
                collapsed: true
                summary: "{name}"
          - name: members
            label: Membri comitet
