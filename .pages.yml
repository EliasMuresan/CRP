content:
  - name: homepage
    label: Pagina principala
    type: file
    path: content/site.json
    format: json
    fields:
      - name: hero
        label: Hero
        type: object
        fields:
          - name: kicker
            label: Eticheta
            type: string
          - name: title
            label: Titlu principal
            type: string
          - name: subtitle
            label: Subtitlu
            type: text
          - name: backgroundImage
            label: Imagine fundal
            type: image
          - name: primaryButton
            label: Buton principal
            component: button
          - name: secondaryButton
            label: Buton secundar
            component: button
      - name: about
        label: Despre noi
        type: object
        fields:
          - name: kicker
            label: Eticheta
            type: string
          - name: title
            label: Titlu
            type: string
          - name: intro
            label: Text introductiv
            type: text
          - name: items
            label: Lista puncte
            type: string
