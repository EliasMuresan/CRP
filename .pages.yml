  - name: event_galleries
    label: Galerii evenimente
    type: collection
    path: content/galleries
    filename: "{fields.slug}.json"
    format: json
    view:
      primary: title
      fields: [title, slug]
      search: [title, slug]
    fields:
      - name: title
        label: Titlu galerie
        type: string
      - name: slug
        label: Slug
        type: string
        pattern: "^[a-z0-9-]+$"
      - name: kicker
        label: Eticheta
        type: string
      - name: intro
        label: Descriere galerie
        type: text
      - name: images
        label: Imagini
        type: image
        list: true

settings:
  content:
    merge: true
  commit:
    templates:
      create: "cms: adauga {name}"
      update: "cms: actualizeaza {name}"
      delete: "cms: sterge {name}"
